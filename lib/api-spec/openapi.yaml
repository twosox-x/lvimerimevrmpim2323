openapi: 3.0.3
info:
  title: Api
  version: 0.2.0
  description: L00T.tv MVP API
servers:
  - url: /api
tags:
  - name: health
  - name: auth
  - name: users
  - name: creators
  - name: categories
  - name: streams
  - name: posts
  - name: chat
  - name: payments
  - name: stats
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }
  /auth/nonce:
    post:
      operationId: authNonce
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WalletRequest" }
      responses:
        "200":
          description: Nonce and SIWE-style message
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NonceResponse" }
  /auth/verify:
    post:
      operationId: authVerify
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AuthVerifyRequest" }
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserResponse" }
  /auth/logout:
    post:
      operationId: authLogout
      tags: [auth]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
  /auth/me:
    get:
      operationId: authMe
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserResponse" }
  /me:
    get:
      operationId: getMe
      tags: [users]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserResponse" }
    patch:
      operationId: updateMe
      tags: [users]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProfileUpdate" }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserResponse" }
  /categories:
    get:
      operationId: getCategories
      tags: [categories]
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items: { $ref: "#/components/schemas/Category" }
                required: [categories]
  /creators:
    get:
      operationId: getCreators
      tags: [creators]
      parameters:
        - { name: q, in: query, schema: { type: string } }
      responses:
        "200":
          description: Creators
          content:
            application/json:
              schema:
                type: object
                properties:
                  creators:
                    type: array
                    items: { $ref: "#/components/schemas/CreatorProfile" }
                required: [creators]
    post:
      operationId: createCreator
      tags: [creators]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatorProfileInput" }
      responses:
        "201":
          description: Created creator
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreatorResponse" }
  /creators/me:
    patch:
      operationId: updateCreatorMe
      tags: [creators]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatorProfileInput" }
      responses:
        "200":
          description: Updated creator
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreatorResponse" }
  /creators/{username}:
    get:
      operationId: getCreator
      tags: [creators]
      parameters:
        - { $ref: "#/components/parameters/Username" }
      responses:
        "200":
          description: Creator
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreatorDetailResponse" }
  /creators/{username}/live:
    get:
      operationId: getCreatorLive
      tags: [streams]
      parameters:
        - { $ref: "#/components/parameters/Username" }
      responses:
        "200":
          description: Live stream
          content:
            application/json:
              schema:
                type: object
                properties:
                  stream:
                    allOf:
                      - { $ref: "#/components/schemas/Stream" }
                    nullable: true
                required: [stream]
  /creators/{username}/posts:
    get:
      operationId: getCreatorPosts
      tags: [posts]
      parameters:
        - { $ref: "#/components/parameters/Username" }
      responses:
        "200":
          description: Creator posts
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items: { $ref: "#/components/schemas/Post" }
                  subscribed: { type: boolean }
                required: [posts, subscribed]
  /streams:
    get:
      operationId: getStreams
      tags: [streams]
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [live] } }
      responses:
        "200":
          description: Streams
          content:
            application/json:
              schema:
                type: object
                properties:
                  streams:
                    type: array
                    items: { $ref: "#/components/schemas/Stream" }
                required: [streams]
    post:
      operationId: createStream
      tags: [streams]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StreamInput" }
      responses:
        "201":
          description: Created stream
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StreamResponse" }
  /streams/{id}:
    get:
      operationId: getStream
      tags: [streams]
      parameters:
        - { $ref: "#/components/parameters/Id" }
      responses:
        "200":
          description: Stream
          content:
            application/json:
              schema:
                type: object
                properties:
                  stream: { $ref: "#/components/schemas/Stream" }
                  locked: { type: boolean }
                required: [stream, locked]
    patch:
      operationId: updateStream
      tags: [streams]
      parameters:
        - { $ref: "#/components/parameters/Id" }
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StreamInput" }
      responses:
        "200":
          description: Updated stream
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StreamResponse" }
  /streams/{id}/start:
    post:
      operationId: startStream
      tags: [streams]
      parameters:
        - { $ref: "#/components/parameters/Id" }
      responses:
        "200":
          description: Started
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StreamResponse" }
  /streams/{id}/end:
    post:
      operationId: endStream
      tags: [streams]
      parameters:
        - { $ref: "#/components/parameters/Id" }
      responses:
        "200":
          description: Ended
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StreamResponse" }
  /streams/{id}/regenerate-key:
    post:
      operationId: regenerateStreamKey
      tags: [streams]
      parameters:
        - { $ref: "#/components/parameters/Id" }
      responses:
        "200":
          description: Regenerated key
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StreamResponse" }
  /streams/{id}/chat:
    get:
      operationId: getStreamChat
      tags: [chat]
      parameters:
        - { $ref: "#/components/parameters/Id" }
      responses:
        "200":
          description: Chat history
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items: { $ref: "#/components/schemas/ChatMessage" }
                required: [messages]
    post:
      operationId: sendStreamChat
      tags: [chat]
      parameters:
        - { $ref: "#/components/parameters/Id" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message: { type: string }
              required: [message]
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { $ref: "#/components/schemas/ChatMessage" }
                required: [message]
  /posts:
    post:
      operationId: createPost
      tags: [posts]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostInput" }
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                type: object
                properties:
                  post: { $ref: "#/components/schemas/Post" }
                required: [post]
  /posts/{id}:
    patch:
      operationId: updatePost
      tags: [posts]
      parameters:
        - { $ref: "#/components/parameters/Id" }
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostInput" }
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                type: object
                properties:
                  post: { $ref: "#/components/schemas/Post" }
                required: [post]
    delete:
      operationId: deletePost
      tags: [posts]
      parameters:
        - { $ref: "#/components/parameters/Id" }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
  /donations/verify:
    post:
      operationId: verifyDonation
      tags: [payments]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DonationVerifyRequest" }
      responses:
        "201":
          description: Verified donation
          content:
            application/json:
              schema:
                type: object
                properties:
                  donation: { $ref: "#/components/schemas/Donation" }
                required: [donation]
  /subscriptions/verify:
    post:
      operationId: verifySubscription
      tags: [payments]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SubscriptionVerifyRequest" }
      responses:
        "201":
          description: Verified subscription
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscription: { $ref: "#/components/schemas/Subscription" }
                required: [subscription]
  /me/subscriptions:
    get:
      operationId: getMySubscriptions
      tags: [payments]
      responses:
        "200":
          description: My subscriptions
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscriptions:
                    type: array
                    items: { $ref: "#/components/schemas/Subscription" }
                required: [subscriptions]
  /creators/{username}/subscription-status:
    get:
      operationId: getSubscriptionStatus
      tags: [payments]
      parameters:
        - { $ref: "#/components/parameters/Username" }
      responses:
        "200":
          description: Subscription status
          content:
            application/json:
              schema:
                type: object
                properties:
                  active: { type: boolean }
                  plan: { $ref: "#/components/schemas/SubscriptionPlan" }
                required: [active]
  /creators/{username}/donations:
    get:
      operationId: getCreatorDonations
      tags: [payments]
      parameters:
        - { $ref: "#/components/parameters/Username" }
      responses:
        "200":
          description: Creator donations
          content:
            application/json:
              schema:
                type: object
                properties:
                  donations:
                    type: array
                    items: { $ref: "#/components/schemas/Donation" }
                required: [donations]
  /streams/{id}/donations:
    get:
      operationId: getStreamDonations
      tags: [payments]
      parameters:
        - { $ref: "#/components/parameters/Id" }
      responses:
        "200":
          description: Stream donations
          content:
            application/json:
              schema:
                type: object
                properties:
                  donations:
                    type: array
                    items: { $ref: "#/components/schemas/Donation" }
                required: [donations]
  /creators/{username}/subscribers:
    get:
      operationId: getCreatorSubscribers
      tags: [payments]
      parameters:
        - { $ref: "#/components/parameters/Username" }
      responses:
        "200":
          description: Creator subscribers
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscribers:
                    type: array
                    items: { $ref: "#/components/schemas/Subscription" }
                required: [subscribers]
  /creators/{username}/stats:
    get:
      operationId: getCreatorStats
      tags: [stats]
      parameters:
        - { $ref: "#/components/parameters/Username" }
      responses:
        "200":
          description: Creator stats
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatsResponse" }
  /streams/{id}/stats:
    get:
      operationId: getStreamStats
      tags: [stats]
      parameters:
        - { $ref: "#/components/parameters/Id" }
      responses:
        "200":
          description: Stream stats
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatsResponse" }
  /creator-stream-key/{streamId}:
    get:
      operationId: getCreatorStreamKey
      tags: [streams]
      parameters:
        - { name: streamId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Private stream key for owner
          content:
            application/json:
              schema:
                type: object
                properties:
                  ingestUrl: { type: string }
                  streamKey: { type: string }
                required: [ingestUrl, streamKey]
components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: string }
    Username:
      name: username
      in: path
      required: true
      schema: { type: string }
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]
    OkResponse:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]
    WalletRequest:
      type: object
      properties:
        walletAddress: { type: string }
      required: [walletAddress]
    AuthVerifyRequest:
      type: object
      properties:
        walletAddress: { type: string }
        signature: { type: string }
      required: [walletAddress, signature]
    NonceResponse:
      type: object
      properties:
        nonce: { type: string }
        message: { type: string }
      required: [nonce, message]
    User:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        walletAddress: { type: string }
        username: { type: string, nullable: true }
        displayName: { type: string, nullable: true }
        role: { type: string, enum: [viewer, creator, admin] }
    UserResponse:
      type: object
      properties:
        user:
          allOf:
            - { $ref: "#/components/schemas/User" }
          nullable: true
      required: [user]
    ProfileUpdate:
      type: object
      additionalProperties: false
      properties:
        username: { type: string }
        displayName: { type: string }
        avatarUrl: { type: string }
        bio: { type: string }
    Category:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        type: { type: string, enum: [game, topic] }
      required: [id, slug, name, type]
    CreatorProfile:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        userId: { type: string }
        username: { type: string }
        displayName: { type: string }
        isLive: { type: boolean }
      required: [id, userId, username, displayName]
    CreatorProfileInput:
      type: object
      properties:
        username: { type: string }
        displayName: { type: string }
        bio: { type: string }
        avatarUrl: { type: string }
        bannerUrl: { type: string }
        channelColor: { type: string }
        primaryCategoryId: { type: string }
      required: [username, displayName]
    CreatorResponse:
      type: object
      properties:
        creator: { $ref: "#/components/schemas/CreatorProfile" }
      required: [creator]
    CreatorDetailResponse:
      type: object
      properties:
        creator: { $ref: "#/components/schemas/CreatorProfile" }
        viewer:
          type: object
          additionalProperties: true
      required: [creator, viewer]
    Stream:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        creatorId: { type: string }
        title: { type: string }
        accessType: { type: string, enum: [public, subscribers] }
        status: { type: string, enum: [offline, live, ended] }
        playbackUrl: { type: string, nullable: true }
      required: [id, creatorId, title, accessType, status]
    StreamInput:
      type: object
      properties:
        title: { type: string }
        categoryId: { type: string }
        accessType: { type: string, enum: [public, subscribers] }
      required: [title]
    StreamResponse:
      type: object
      properties:
        stream: { $ref: "#/components/schemas/Stream" }
      required: [stream]
    Post:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        creatorId: { type: string }
        content: { type: string, nullable: true }
        visibility: { type: string, enum: [public, subscribers] }
        locked: { type: boolean }
      required: [id, creatorId, visibility]
    PostInput:
      type: object
      properties:
        title: { type: string }
        content: { type: string }
        visibility: { type: string, enum: [public, subscribers] }
        mediaUrl: { type: string }
      required: [content]
    ChatMessage:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        streamId: { type: string }
        message: { type: string }
        type: { type: string }
      required: [id, streamId, message, type]
    DonationVerifyRequest:
      type: object
      properties:
        creatorUsername: { type: string }
        streamId: { type: string }
        txHash: { type: string }
        token: { type: string, enum: [ETH, L00T] }
        amount: { type: string }
        message: { type: string }
      required: [creatorUsername, txHash, token, amount]
    SubscriptionVerifyRequest:
      type: object
      properties:
        creatorUsername: { type: string }
        txHash: { type: string }
        paymentToken: { type: string, enum: [ETH, L00T] }
      required: [creatorUsername, txHash, paymentToken]
    Donation:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        txHash: { type: string }
        status: { type: string }
      required: [id, txHash, status]
    Subscription:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        status: { type: string }
        expiresAt: { type: string }
      required: [id, status]
    SubscriptionPlan:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        durationDays: { type: number }
        ethPrice: { type: string }
        lootPrice: { type: string }
    StatsResponse:
      type: object
      properties:
        stats:
          type: object
          additionalProperties: true
      required: [stats]
